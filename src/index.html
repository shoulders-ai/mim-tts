<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mim TTS</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./main.js" defer></script>
  </head>
  <body class="panel-shell">
    <main class="panel" data-state="idle">

      <header class="panel-header">
        <div class="status-cluster">
          <span class="status-dot" aria-hidden="true"></span>
          <div>
            <div id="status-label" class="status-label">Mim TTS</div>
            <div id="status-detail" class="status-detail"></div>
          </div>
        </div>
        <button id="record-toggle" class="icon-button primary" type="button" title="Record">
          <span class="record-glyph" aria-hidden="true"></span>
        </button>
      </header>

      <section id="setup-section" class="setup-section" hidden>
        <div class="setup-head">
          <div class="setup-title">Set up Mim</div>
          <div id="setup-detail" class="setup-detail">Finish these steps before dictation starts.</div>
        </div>

        <div class="setup-list" role="list">
          <button id="setup-model" class="setup-task" type="button">
            <span class="setup-index">1</span>
            <span class="setup-copy">
              <span class="setup-task-title">Download speech model</span>
              <span id="setup-model-detail" class="setup-task-detail">Base, recommended</span>
            </span>
            <span id="setup-model-badge" class="setup-badge">Needed</span>
          </button>

          <button id="setup-mic" class="setup-task" type="button">
            <span class="setup-index">2</span>
            <span class="setup-copy">
              <span class="setup-task-title">Allow microphone</span>
              <span id="setup-mic-detail" class="setup-task-detail">Required to record</span>
            </span>
            <span id="setup-mic-badge" class="setup-badge">Needed</span>
          </button>

          <button id="setup-keyboard" class="setup-task" type="button">
            <span class="setup-index">3</span>
            <span class="setup-copy">
              <span class="setup-task-title">Enable keyboard access</span>
              <span id="setup-keyboard-detail" class="setup-task-detail">Required for Option and paste</span>
            </span>
            <span id="setup-keyboard-badge" class="setup-badge">Needed</span>
          </button>
        </div>

        <div id="setup-download-track" class="setup-download-track" hidden>
          <span id="setup-download-fill"></span>
        </div>

        <button id="setup-continue" class="setup-continue" type="button">Start setup</button>
      </section>

      <section id="settings-section" class="settings-section">
        <button id="settings-toggle" class="settings-toggle" type="button" aria-expanded="false">
          <span class="chevron" aria-hidden="true">›</span>
          <span>Settings</span>
          <span id="settings-dot" class="settings-dot" hidden></span>
        </button>

        <div id="settings-body" class="settings-body" hidden>

          <div class="setting-row" id="model-row">
            <span class="setting-label">Model</span>
            <div class="setting-picker model-picker">
              <button id="model-button" class="setting-value" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span id="model-value">base · ready</span>
              </button>
              <div id="model-menu" class="dropdown-menu model-menu" hidden>
                <div id="model-list" class="dropdown-list" role="listbox" aria-label="Models"></div>
              </div>
            </div>
          </div>

          <div class="setting-row">
            <span class="setting-label">Language</span>
            <div class="setting-picker language-picker">
              <button id="language-button" class="setting-value" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span id="language-value">de/en</span>
              </button>
              <div id="language-menu" class="dropdown-menu language-menu" hidden>
                <div id="language-list" class="dropdown-list language-grid" role="listbox" aria-label="Languages"></div>
              </div>
            </div>
          </div>

          <div class="setting-row">
            <span class="setting-label">Hotkey</span>
            <button id="hotkey-record" class="setting-hotkey" type="button">
              <span id="hotkey-value" class="hotkey-keys">Option</span>
              <span id="hotkey-action" class="hotkey-tag">rec</span>
            </button>
          </div>

          <div class="setting-row">
            <span class="setting-label">Activation</span>
            <div class="seg-mini" role="group" aria-label="Activation mode">
              <button id="mode-hold" type="button" aria-pressed="true">Hold</button>
              <button id="mode-toggle" type="button" aria-pressed="false">Tap</button>
            </div>
          </div>

          <div class="setting-divider"></div>

          <button id="audio-cues-toggle" class="setting-row setting-btn" type="button" aria-pressed="true">
            <span class="setting-label">Play sound effects</span>
            <span class="sw"></span>
          </button>
          <button id="mute-toggle" class="setting-row setting-btn" type="button" aria-pressed="false">
            <span class="setting-label">Mute while recording</span>
            <span class="sw"></span>
          </button>

          <div class="setting-divider"></div>

          <button id="perm-mic" class="setting-row setting-perm" type="button">
            <span class="setting-label">Microphone access</span>
            <span class="perm-badge">Grant</span>
          </button>
          <button id="perm-acc" class="setting-row setting-perm" type="button">
            <span class="setting-label">Keyboard access</span>
            <span class="perm-badge">Request</span>
          </button>

        </div>
      </section>

      <section id="content-section" class="content-section">
        <div id="model-gate" class="model-gate" hidden>
          <div>
            <div id="model-gate-title" class="model-gate-title">Download model</div>
            <div id="model-gate-detail" class="model-gate-detail">A local Whisper model is required before recording.</div>
          </div>
          <button id="model-download-button" class="model-download-button" type="button">Download</button>
          <div id="model-download-track" class="model-download-track" aria-hidden="true">
            <span id="model-download-fill"></span>
          </div>
          <div id="model-download-progress" class="model-download-progress"></div>
        </div>

        <div id="stats-section" class="stats-section" hidden>
          <div class="section-label">30-day stats</div>
          <div id="dictation-stats" class="stats-row"></div>
        </div>

        <div class="history-section">
          <div class="section-label">
            Transcriptions
            <span class="section-actions">
              <span class="section-hint">click to copy</span>
              <button id="clear-history" class="clear-btn" type="button" hidden>clear</button>
            </span>
          </div>
          <div class="history-scroll">
            <div id="empty-history" class="empty-state">No transcriptions yet</div>
            <div id="history-list" class="history-list"></div>
          </div>
        </div>
      </section>

    </main>
  </body>
</html>
